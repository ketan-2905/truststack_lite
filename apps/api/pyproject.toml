[project]
name = "truststack-api"
version = "0.1.0"
description = "TrustStack Lite backend API"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.111,<1.0",
    "uvicorn[standard]>=0.30,<1.0",
    "sqlalchemy>=2.0,<2.1",
    "alembic>=1.13,<2.0",
    "psycopg[binary]>=3.1,<4.0",
    "pydantic>=2.7,<3.0",
    "pydantic-settings>=2.3,<3.0",
    "email-validator>=2.1,<3.0",
    "argon2-cffi>=23.1,<24.0",
    "pyjwt>=2.8,<3.0",
    "redis>=5.0,<6.0",
    "rq>=1.16,<2.0",
    "boto3>=1.34,<2.0",
    "httpx>=0.27,<1.0",
    "pillow>=10.3,<11.0",
    "google-cloud-documentai>=2.20,<4.0",
    "prometheus-client>=0.20,<1.0",
    "python-multipart>=0.0.9,<1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0,<9.0",
    "pytest-cov>=5.0,<6.0",
    "httpx>=0.27,<1.0",
    "ruff>=0.5,<1.0",
    "mypy>=1.10,<2.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["app"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
filterwarnings = ["ignore::DeprecationWarning"]

[tool.ruff]
line-length = 100
target-version = "py312"
# Alembic migration scripts are autogenerated; don't lint their style.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
# B008: FastAPI Depends() in defaults is idiomatic.
# UP046/UP040: PEP-695 generics/aliases not adopted (Pydantic generic models).
ignore = ["B008", "E501", "UP046", "UP040"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
