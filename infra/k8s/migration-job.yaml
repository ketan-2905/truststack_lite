apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  namespace: truststack-lite
spec:
  template:
    spec:
      containers:
      - name: migration
        image: truststack-api:latest
        imagePullPolicy: Always
        command:
        - sh
        - -c
        - "alembic upgrade head"
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: url
      restartPolicy: Never
  backoffLimit: 3
