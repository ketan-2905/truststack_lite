apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: truststack
  namespace: truststack-lite
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.truststack.example.com
    - truststack.example.com
    secretName: truststack-tls
  rules:
  - host: api.truststack.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api
            port:
              number: 8000
  - host: truststack.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web
            port:
              number: 3000
