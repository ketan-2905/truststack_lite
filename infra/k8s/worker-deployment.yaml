apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: truststack-lite
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: truststack-api:latest
        imagePullPolicy: Always
        command: ["python", "-m", "app.worker"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: url
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        - name: S3_ENDPOINT_URL
          value: "http://minio:9000"
        - name: S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: s3-bucket
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "import redis; redis.Redis.from_url(os.environ['REDIS_URL']).ping()"
          initialDelaySeconds: 10
          periodSeconds: 30
